title: CallPlan
tagline: "Never Miss a Call"
description: "CallPlan – Smart call scheduler with CarPlay & Siri support. Plan calls, take hands-free notes and send follow-ups automatically. Available on iOS."
logo: /assets/img/logo.png
url: "https://callplan.app"
author: "Quick-ID"

# App Store – paste your full App Store URL here once you have it, e.g.:
# app_store_url: "https://apps.apple.com/app/callplan/id1234567890"
app_store_url: "https://apps.apple.com/us/app/callplan/id6740268495"

# App ID for the Smart App Banner (numeric ID from App Store Connect)
app_id: "6740268495"

# Social / SEO
twitter:
  username: callplan_app   # replace with your actual handle (without @)
  card: summary_large_image

keywords: "CallPlan, CarPlay, Siri, call scheduling, CRM integration, AI call summaries, call preparation, hands-free calling, productivity app, sales automation, call reminders, voice notes, offline app, iOS productivity"
social_image: /assets/img/social-preview.svg

# GitHub Pages
show_downloads: false
google_analytics:           # paste your GA4 measurement ID here (G-XXXXXXXXXX)

# Web3Forms – free form backend for the feature survey (web3forms.com)
# Sign up → Dashboard → Create Access Key → paste it here
web3forms_key: "84150486-f60b-46c9-8942-a1da43ed96dc"
remote_theme: pages-themes/minimal@v0.2.0

plugins:
- jekyll-remote-theme
- jekyll-sitemap
- jekyll-seo-tag

# Serve hidden directories (needed for .well-known/apple-app-site-association)
include:
  - .well-known

# Automatically assign lang based on directory
defaults:
  - scope:
      path: ""
    values:
      lang: de
  - scope:
      path: "en"
    values:
      lang: en
  - scope:
      path: "es"
    values:
      lang: es
