<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)" />
  <g filter="url(#shadow)">
    <rect x="60" y="60" width="1080" height="510" rx="32" fill="#0f172a" opacity="0.96"/>
  </g>
  <text x="120" y="180" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">CallPlan</text>
  <text x="120" y="260" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600">Smart calls in CarPlay, CRM and AI</text>
  <rect x="120" y="320" width="96" height="96" rx="24" fill="#2563eb" />
  <text x="240" y="380" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">Call scheduling</text>
  <text x="120" y="430" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">Hands-free Siri notes, follow-up automation and CRM sync.</text>
  <text x="120" y="520" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">https://callplan.app</text>
</svg>
